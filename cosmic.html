<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cosmic Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const W = canvas.width;
const H = canvas.height;
const CX = W / 2;
const CY = H / 2;

// Stars
const stars = Array.from({ length: 300 }, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.5 + 0.2,
  alpha: Math.random() * 0.7 + 0.3,
  twinkleSpeed: Math.random() * 0.02 + 0.005,
  twinkleOffset: Math.random() * Math.PI * 2
}));

// Planets
const planets = [
  { name: 'Mercury', radius: 60,  size: 5,  color: '#b5b5b5', glowColor: 'rgba(181,181,181,0.4)', speed: 0.047, angle: 0.5 },
  { name: 'Venus',   radius: 100, size: 8,  color: '#e8cda0', glowColor: 'rgba(232,205,160,0.4)', speed: 0.035, angle: 1.2 },
  { name: 'Earth',   radius: 145, size: 9,  color: '#4fa3e0', glowColor: 'rgba(79,163,224,0.4)',  speed: 0.029, angle: 2.1 },
  { name: 'Mars',    radius: 195, size: 7,  color: '#c1440e', glowColor: 'rgba(193,68,14,0.4)',   speed: 0.024, angle: 3.5 },
  { name: 'Jupiter', radius: 255, size: 18, color: '#c88b3a', glowColor: 'rgba(200,139,58,0.4)',  speed: 0.013, angle: 5.0 },
];

// Shooting stars
let shootingStars = [];
let lastShoot = 0;

function spawnShootingStar() {
  const edge = Math.random();
  let x, y, vx, vy;
  if (edge < 0.5) { x = Math.random() * W; y = 0; vx = (Math.random() - 0.5) * 6; vy = Math.random() * 6 + 4; }
  else { x = 0; y = Math.random() * H * 0.5; vx = Math.random() * 8 + 4; vy = Math.random() * 4 + 2; }
  shootingStars.push({ x, y, vx, vy, life: 1, tail: [] });
}

function drawSun(t) {
  // Outer glow layers
  [80, 60, 45, 32].forEach((r, i) => {
    const g = ctx.createRadialGradient(CX, CY, 0, CX, CY, r);
    const alpha = [0.04, 0.08, 0.15, 0.25][i];
    g.addColorStop(0, `rgba(255,200,50,${alpha})`);
    g.addColorStop(1, 'rgba(255,150,0,0)');
    ctx.beginPath();
    ctx.arc(CX, CY, r, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
  });

  // Corona pulse
  const pulse = Math.sin(t * 0.03) * 3;
  const corona = ctx.createRadialGradient(CX, CY, 18, CX, CY, 30 + pulse);
  corona.addColorStop(0, 'rgba(255,220,80,0.6)');
  corona.addColorStop(1, 'rgba(255,100,0,0)');
  ctx.beginPath();
  ctx.arc(CX, CY, 30 + pulse, 0, Math.PI * 2);
  ctx.fillStyle = corona;
  ctx.fill();

  // Sun body
  const sunGrad = ctx.createRadialGradient(CX - 5, CY - 5, 2, CX, CY, 22);
  sunGrad.addColorStop(0, '#fff7a0');
  sunGrad.addColorStop(0.4, '#ffd700');
  sunGrad.addColorStop(1, '#ff6a00');
  ctx.beginPath();
  ctx.arc(CX, CY, 22, 0, Math.PI * 2);
  ctx.fillStyle = sunGrad;
  ctx.fill();
}

function drawOrbit(radius) {
  ctx.beginPath();
  ctx.arc(CX, CY, radius, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
}

function drawPlanet(p) {
  const x = CX + Math.cos(p.angle) * p.radius;
  const y = CY + Math.sin(p.angle) * p.radius;

  // Glow
  const glow = ctx.createRadialGradient(x, y, 0, x, y, p.size * 3);
  glow.addColorStop(0, p.glowColor);
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(x, y, p.size * 3, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  // Body
  const grad = ctx.createRadialGradient(x - p.size * 0.3, y - p.size * 0.3, p.size * 0.1, x, y, p.size);
  grad.addColorStop(0, lighten(p.color));
  grad.addColorStop(1, darken(p.color));
  ctx.beginPath();
  ctx.arc(x, y, p.size, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
}

function lighten(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`;
}

function darken(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-40)})`;
}

function drawStars(t) {
  stars.forEach(s => {
    const alpha = s.alpha * (0.6 + 0.4 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  });
}

function drawShootingStars() {
  shootingStars = shootingStars.filter(s => s.life > 0);
  shootingStars.forEach(s => {
    s.tail.unshift({ x: s.x, y: s.y });
    if (s.tail.length > 18) s.tail.pop();
    s.x += s.vx;
    s.y += s.vy;
    s.life -= 0.025;

    s.tail.forEach((pt, i) => {
      const alpha = (1 - i / s.tail.length) * s.life * 0.9;
      const size = (1 - i / s.tail.length) * 2.5;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,220,${alpha})`;
      ctx.fill();
    });

    if (s.x > W + 50 || s.y > H + 50) s.life = 0;
  });
}

let t = 0;
function animate() {
  requestAnimationFrame(animate);
  ctx.fillStyle = 'rgba(0,0,2,0.18)';
  ctx.fillRect(0, 0, W, H);

  drawStars(t);

  // Shoot every 3-7 seconds
  if (t - lastShoot > (180 + Math.random() * 240)) {
    spawnShootingStar();
    lastShoot = t;
  }
  drawShootingStars();

  planets.forEach(p => drawOrbit(p.radius));
  drawSun(t);
  planets.forEach(p => {
    drawPlanet(p);
    p.angle += p.speed * 0.016;
  });

  t++;
}

animate();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
